# Chocofi (built as the corne shield) — Miryoku ZMK config
#
# Switch-chatter fix: raise the kscan *release* debounce so a momentary
# mid-press contact bounce in a hotswap socket isn't seen as release+repress
# (which produced duplicate letters, e.g. "gettting").
# ZMK default is 5ms press / 5ms release. Bump release to 8ms; go to 10 if
# chatter still slips through. Leave press at 5 (raising it only adds latency).

CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=8
